services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: enterprise-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Generation + constitutional critic — Llama 3.1 8B Instruct on 1× L40S
  vllm-gen:
    image: vllm/vllm-openai:v0.6.6
    container_name: enterprise-rag-vllm-gen
    command:
      - --model=meta-llama/Llama-3.1-8B-Instruct
      - --max-model-len=8192
      - --gpu-memory-utilization=0.55
      - --port=8000
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s

  # LlamaGuard 3 8B on 1× L40S
  vllm-guard:
    image: vllm/vllm-openai:v0.6.6
    container_name: enterprise-rag-vllm-guard
    command:
      - --model=meta-llama/Llama-Guard-3-8B
      - --max-model-len=4096
      - --gpu-memory-utilization=0.55
      - --port=8000
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["3"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s

  api:
    build: .
    container_name: enterprise-rag-api
    depends_on:
      qdrant:
        condition: service_healthy
      vllm-gen:
        condition: service_healthy
      vllm-guard:
        condition: service_healthy
    ports:
      - "8088:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - VLLM_GEN_URL=http://vllm-gen:8000/v1
      - VLLM_GUARD_URL=http://vllm-guard:8000/v1
    env_file:
      - .env
    # Embeddings + reranker on dedicated GPU 2 (freed by 70B → 8B switch).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]
