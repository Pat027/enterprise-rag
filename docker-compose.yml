services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: enterprise-rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Generation + constitutional critic — Llama 3.1 8B Instruct FP8 on 1× L40S.
  # See docs/vllm-optimization.md for the rationale behind each flag.
  vllm-gen:
    image: vllm/vllm-openai:v0.6.6
    container_name: enterprise-rag-vllm-gen
    command:
      # Optimization 1: FP8 model weights — half memory, ~1.3-1.5× throughput on
      # Ada (L40S has native FP8 tensor cores). Quality drop <1% on benchmarks.
      - --model=neuralmagic/Meta-Llama-3.1-8B-Instruct-FP8-dynamic
      # Optimization 2: FP8 KV cache — KV is the dominant memory cost during
      # decode. Halves it; quality impact negligible for our short-context flow.
      - --kv-cache-dtype=fp8
      # Optimization 3: prefix caching — our system prompt is identical for every
      # query. vLLM hashes prompt prefixes and reuses their KV. Big TTFT win.
      - --enable-prefix-caching
      # Optimization 4: lower max-model-len 8192 → 4096. Our prompts (system +
      # 5 retrieved chunks + query) comfortably fit in 4K. Frees KV cache budget.
      - --max-model-len=4096
      # Optimization 5: GPU memory utilization 0.80. Earlier round had this at 0.90;
      # spec decoding's draft model needs ~3 GB so we drop it to leave headroom.
      - --gpu-memory-utilization=0.80
      # Optimization 6: speculative decoding with Llama 3.2 1B as draft. Same
      # Llama family → high acceptance rate. Draft proposes 5 tokens, target
      # verifies in one forward pass. See docs/vllm-optimization.md §6.
      - --speculative-model=meta-llama/Llama-3.2-1B-Instruct
      - --num-speculative-tokens=5
      - --port=8000
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s

  # LlamaGuard 3 8B on 1× L40S (BF16 — no widely-published FP8 variant yet).
  # Inherits FP8 KV cache + prefix caching for the same reasons as vllm-gen.
  vllm-guard:
    image: vllm/vllm-openai:v0.6.6
    container_name: enterprise-rag-vllm-guard
    command:
      - --model=meta-llama/Llama-Guard-3-8B
      - --kv-cache-dtype=fp8
      - --enable-prefix-caching
      - --max-model-len=2048   # LlamaGuard taxonomy + short turns fit easily
      - --gpu-memory-utilization=0.55
      - --port=8000
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - ./hf_cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["3"]
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 15s
      timeout: 5s
      retries: 30
      start_period: 180s

  api:
    build: .
    container_name: enterprise-rag-api
    depends_on:
      qdrant:
        condition: service_healthy
      vllm-gen:
        condition: service_healthy
      vllm-guard:
        condition: service_healthy
    ports:
      - "8088:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - VLLM_GEN_URL=http://vllm-gen:8000/v1
      - VLLM_GUARD_URL=http://vllm-guard:8000/v1
      - OTEL_ENABLED=true
      - OTEL_ENDPOINT=http://otel-collector:4317
    env_file:
      - .env
    # Embeddings + reranker on dedicated GPU 2 (freed by 70B → 8B switch).
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["2"]
              capabilities: [gpu]

  # ── Observability stack ──────────────────────────────────────────────────
  # OTel Collector receives OTLP from the API and fans out to Tempo (traces)
  # and a Prometheus exporter (metrics). See deploy/observability/README.md.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.0
    container_name: enterprise-rag-otel-collector
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./deploy/observability/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    container_name: enterprise-rag-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: enterprise-rag-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./deploy/observability/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: enterprise-rag-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./deploy/observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./deploy/observability/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"   # 3000 is reserved for the future frontend
    depends_on:
      - prometheus
      - tempo

volumes:
  tempo_data:
  prometheus_data:
  grafana_data:
