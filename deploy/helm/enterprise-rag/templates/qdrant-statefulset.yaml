{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-qdrant
  labels:
    {{- include "enterprise-rag.componentLabels" (dict "ctx" . "component" "qdrant") | nindent 4 }}
spec:
  serviceName: {{ include "enterprise-rag.fullname" . }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 8 }}
    spec:
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 6333
              protocol: TCP
            - name: grpc
              containerPort: 6334
              protocol: TCP
          volumeMounts:
            - name: storage
              mountPath: /qdrant/storage
          livenessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
      {{- with .Values.qdrant.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qdrant.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if not .Values.qdrant.persistence.enabled }}
      volumes:
        - name: storage
          emptyDir: {}
      {{- end }}
  {{- if .Values.qdrant.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.qdrant.persistence.size }}
        {{- with .Values.qdrant.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
  {{- end }}
{{- end }}
