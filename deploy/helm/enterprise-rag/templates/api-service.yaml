{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-api
  labels:
    {{- include "enterprise-rag.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: 8000
      protocol: TCP
  selector:
    {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
{{- end }}
