{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-qdrant
  labels:
    {{- include "enterprise-rag.componentLabels" (dict "ctx" . "component" "qdrant") | nindent 4 }}
spec:
  type: {{ .Values.qdrant.service.type }}
  ports:
    - name: http
      port: {{ .Values.qdrant.service.httpPort }}
      targetPort: 6333
      protocol: TCP
    - name: grpc
      port: {{ .Values.qdrant.service.grpcPort }}
      targetPort: 6334
      protocol: TCP
  selector:
    {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "qdrant") | nindent 4 }}
{{- end }}
