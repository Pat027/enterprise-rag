{{- if .Values.vllmGen.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-vllm-gen
  labels:
    {{- include "enterprise-rag.componentLabels" (dict "ctx" . "component" "vllm-gen") | nindent 4 }}
spec:
  # vLLM serving is stateful per-Pod (KV cache, prefix cache, draft model
  # weights). Scale by adding more vLLM Deployments behind a load-balancer
  # service, NOT by increasing replicas of a single Deployment.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "vllm-gen") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "enterprise-rag.selectorLabels" (dict "ctx" . "component" "vllm-gen") | nindent 8 }}
    spec:
      {{- if .Values.gpuOperator.runtimeClassName }}
      runtimeClassName: {{ .Values.gpuOperator.runtimeClassName }}
      {{- end }}
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.vllmGen.shmSizeGi }}Gi
        {{- if .Values.vllmGen.hfCache.enabled }}
        - name: hf-cache
          {{- if .Values.vllmGen.hfCache.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "enterprise-rag.fullname" . }}-vllm-gen-hf
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
      containers:
        - name: vllm-gen
          image: "{{ .Values.vllmGen.image.repository }}:{{ .Values.vllmGen.image.tag }}"
          imagePullPolicy: {{ .Values.vllmGen.image.pullPolicy }}
          args:
            {{- toYaml .Values.vllmGen.args | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- include "enterprise-rag.hfTokenEnv" . | nindent 12 }}
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.vllmGen.hfCache.enabled }}
            - name: hf-cache
              mountPath: /root/.cache/huggingface
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.vllmGen.resources | nindent 12 }}
      {{- with .Values.vllmGen.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vllmGen.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vllmGen.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if and .Values.vllmGen.hfCache.enabled .Values.vllmGen.hfCache.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "enterprise-rag.fullname" . }}-vllm-gen-hf
  labels:
    {{- include "enterprise-rag.componentLabels" (dict "ctx" . "component" "vllm-gen") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.vllmGen.hfCache.persistence.size }}
  {{- with .Values.vllmGen.hfCache.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
{{- end }}
