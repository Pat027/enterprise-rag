{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "enterprise-rag.secretName" . }}
  labels:
    {{- include "enterprise-rag.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ .Values.secrets.hfToken | default "" | quote }}
  API_KEYS: {{ .Values.secrets.apiKeys | default "" | quote }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | default "" | quote }}
{{- end }}
